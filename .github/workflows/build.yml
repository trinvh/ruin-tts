name: build

# Builds the Rust servers/CLI and the Tauri desktop app for the supported desktop
# targets — macOS Apple Silicon (M-series), macOS Intel (x86_64) and Windows x64 —
# and uploads the binaries + installers as artifacts. On a `v*` tag it also
# publishes them to a GitHub Release.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

# Needed for the tag → GitHub Release step (softprops/action-gh-release).
permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (Apple Silicon)
            os: macos-14 # arm64 runner → aarch64-apple-darwin
            ext: ""
            triple: aarch64-apple-darwin
          - label: macOS (Intel)
            os: macos-13 # x86_64 runner → x86_64-apple-darwin
            ext: ""
            triple: x86_64-apple-darwin
          - label: Windows (x64)
            os: windows-latest
            ext: ".exe"
            triple: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # whisper.cpp (in the media-ai sidecar) is built from source via cmake.
      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          # The Tauri app crate (ui/src-tauri) is excluded from the workspace and
          # has its own target dir, so cache both roots.
          workspaces: |
            .
            ui/src-tauri

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      # Rust servers + CLI + media-ai sidecar. ort downloads the host ONNX
      # Runtime (arm64 macOS / x64 Windows); whisper.cpp builds via cmake.
      - name: Build Rust workspace (release)
        run: cargo build --release --workspace

      # Stage the server binaries where Tauri's externalBin expects them
      # (binaries/<name>-<triple>), so the installer bundles them → self-contained.
      - name: Stage sidecars for bundling (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p ui/src-tauri/binaries
          for b in vieneu-server studio-server media-ai; do
            cp "target/release/$b" "ui/src-tauri/binaries/$b-${{ matrix.triple }}"
          done
      - name: Stage sidecars for bundling (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force ui/src-tauri/binaries | Out-Null
          foreach ($b in 'vieneu-server','studio-server','media-ai') {
            Copy-Item "target/release/$b.exe" "ui/src-tauri/binaries/$b-${{ matrix.triple }}.exe"
          }

      # On Intel macOS, ort uses load-dynamic (no prebuilt) → ship libonnxruntime
      # so the bundled app runs without a system ONNX Runtime. Version must match
      # ort-sys rc.12 (1.24.2); fall back to Homebrew if the upstream archive is
      # unavailable. Bundled via tauri.conf resources/; lib.rs sets ORT_DYLIB_PATH.
      - name: Bundle ONNX Runtime (Intel macOS only)
        if: matrix.triple == 'x86_64-apple-darwin'
        run: |
          mkdir -p ui/src-tauri/runtime
          VER=1.24.2
          URL="https://github.com/microsoft/onnxruntime/releases/download/v${VER}/onnxruntime-osx-x86_64-${VER}.tgz"
          if curl -fsSL "$URL" -o /tmp/ort.tgz; then
            tar -xzf /tmp/ort.tgz -C /tmp
            cp "/tmp/onnxruntime-osx-x86_64-${VER}/lib/libonnxruntime.${VER}.dylib" ui/src-tauri/runtime/libonnxruntime.dylib
          else
            echo "upstream archive missing — falling back to Homebrew onnxruntime"
            brew install onnxruntime
            cp "$(brew --prefix onnxruntime)/lib/libonnxruntime.dylib" ui/src-tauri/runtime/libonnxruntime.dylib
          fi
          ls -la ui/src-tauri/runtime

      - name: Install UI dependencies
        run: pnpm -C ui install --frozen-lockfile

      # Builds the frontend (beforeBuildCommand) + the Tauri shell and bundles the
      # installer with the sidecars (.dmg/.app on macOS, .msi/.exe on Windows).
      # Unsigned in CI.
      - name: Build Tauri app
        run: pnpm -C ui tauri build

      - name: Upload server binaries
        uses: actions/upload-artifact@v4
        with:
          name: servers-${{ matrix.os }}
          if-no-files-found: error
          path: |
            target/release/vieneu-server${{ matrix.ext }}
            target/release/studio-server${{ matrix.ext }}
            target/release/media-ai${{ matrix.ext }}
            target/release/vieneu${{ matrix.ext }}

      - name: Upload app installers
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.os }}
          if-no-files-found: error
          path: |
            ui/src-tauri/target/release/bundle/**/*

      - name: Publish to release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/vieneu-server${{ matrix.ext }}
            target/release/studio-server${{ matrix.ext }}
            target/release/media-ai${{ matrix.ext }}
            target/release/vieneu${{ matrix.ext }}
            ui/src-tauri/target/release/bundle/**/*
